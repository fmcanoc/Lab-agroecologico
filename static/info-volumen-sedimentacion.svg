<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="520" height="400" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="260" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#2d6a4f">Método del Cilindro de Sedimentación</text>
  <text x="260" y="48" text-anchor="middle" font-size="11" fill="#666">Determinación de textura por velocidad de asentamiento</text>

  <!-- === CYLINDER 1: Agitado === -->
  <text x="80" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">1. Agitar</text>
  <!-- cylinder body -->
  <rect x="42" y="82" width="76" height="170" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
  <!-- turbid water fill -->
  <rect x="44" y="84" width="72" height="166" rx="4" fill="#8ecae6" opacity="0.5"/>
  <!-- soil particles scattered -->
  <circle cx="60" cy="100" r="3" fill="#a0522d" opacity="0.7"/>
  <circle cx="75" cy="115" r="2" fill="#8b6914" opacity="0.7"/>
  <circle cx="90" cy="108" r="3.5" fill="#a0522d" opacity="0.7"/>
  <circle cx="68" cy="130" r="2" fill="#6b4226" opacity="0.7"/>
  <circle cx="100" cy="125" r="3" fill="#a0522d" opacity="0.6"/>
  <circle cx="55" cy="145" r="2.5" fill="#8b6914" opacity="0.6"/>
  <circle cx="85" cy="138" r="2" fill="#a0522d" opacity="0.5"/>
  <circle cx="72" cy="155" r="3" fill="#6b4226" opacity="0.7"/>
  <circle cx="95" cy="165" r="2" fill="#a0522d" opacity="0.6"/>
  <circle cx="60" cy="175" r="3" fill="#8b6914" opacity="0.5"/>
  <circle cx="108" cy="148" r="2" fill="#6b4226" opacity="0.6"/>
  <circle cx="50" cy="190" r="3" fill="#a0522d" opacity="0.7"/>
  <circle cx="80" cy="200" r="2.5" fill="#8b6914" opacity="0.6"/>
  <circle cx="105" cy="195" r="2" fill="#a0522d" opacity="0.5"/>
  <!-- measure marks -->
  <line x1="118" y1="84" x2="124" y2="84" stroke="#aaa" stroke-width="1"/>
  <line x1="118" y1="120" x2="124" y2="120" stroke="#aaa" stroke-width="1"/>
  <line x1="118" y1="160" x2="124" y2="160" stroke="#aaa" stroke-width="1"/>
  <line x1="118" y1="200" x2="124" y2="200" stroke="#aaa" stroke-width="1"/>
  <line x1="118" y1="248" x2="124" y2="248" stroke="#aaa" stroke-width="1"/>
  <!-- bottom -->
  <rect x="38" y="252" width="84" height="8" rx="4" fill="#74c0fc" stroke="#4dabf7" stroke-width="1"/>
  <!-- label -->
  <text x="80" y="275" text-anchor="middle" font-size="9.5" fill="#888">5 min agitado</text>

  <!-- === ARROW 1 === -->
  <text x="152" y="148" text-anchor="middle" font-size="20" fill="#74c0fc">→</text>
  <text x="152" y="163" text-anchor="middle" font-size="9" fill="#888">2 min</text>

  <!-- === CYLINDER 2: Sand settled === -->
  <text x="226" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">2. Arena baja</text>
  <rect x="188" y="82" width="76" height="170" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
  <!-- water layer (top, cloudy) -->
  <rect x="190" y="84" width="72" height="100" rx="2" fill="#b2d8e8" opacity="0.6"/>
  <!-- silt+clay particles still -->
  <circle cx="205" cy="95" r="1.5" fill="#8b6914" opacity="0.5"/>
  <circle cx="230" cy="110" r="1.5" fill="#6b4226" opacity="0.4"/>
  <circle cx="248" cy="130" r="1.5" fill="#8b6914" opacity="0.4"/>
  <!-- sand layer at bottom -->
  <rect x="190" y="184" width="72" height="36" rx="2" fill="#f4a261"/>
  <text x="226" y="206" text-anchor="middle" font-size="8.5" fill="#7c3517" font-weight="bold">Arena</text>
  <!-- bottom -->
  <rect x="184" y="252" width="84" height="8" rx="4" fill="#74c0fc" stroke="#4dabf7" stroke-width="1"/>
  <text x="226" y="275" text-anchor="middle" font-size="9.5" fill="#888">Arena asentada</text>

  <!-- === ARROW 2 === -->
  <text x="298" y="148" text-anchor="middle" font-size="20" fill="#74c0fc">→</text>
  <text x="298" y="163" text-anchor="middle" font-size="9" fill="#888">24–48h</text>

  <!-- === CYLINDER 3: Fully settled === -->
  <text x="372" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#444">3. Sedimentado</text>
  <rect x="334" y="82" width="76" height="170" rx="6" fill="#d0ebff" stroke="#74c0fc" stroke-width="1.5"/>
  <!-- water clear -->
  <rect x="336" y="84" width="72" height="60" rx="2" fill="#e8f4f8" opacity="0.9"/>
  <text x="372" y="119" text-anchor="middle" font-size="8.5" fill="#74c0fc">Agua</text>
  <!-- clay layer -->
  <rect x="336" y="144" width="72" height="28" rx="2" fill="#c9b1ff"/>
  <text x="372" y="162" text-anchor="middle" font-size="8.5" fill="#4b3cad" font-weight="bold">Arcilla</text>
  <!-- silt layer -->
  <rect x="336" y="172" width="72" height="28" rx="2" fill="#f1c40f"/>
  <text x="372" y="190" text-anchor="middle" font-size="8.5" fill="#7d6608" font-weight="bold">Limo</text>
  <!-- sand layer -->
  <rect x="336" y="200" width="72" height="22" rx="2" fill="#f4a261"/>
  <text x="372" y="215" text-anchor="middle" font-size="8.5" fill="#7c3517" font-weight="bold">Arena</text>
  <!-- measure arrows -->
  <line x1="416" y1="144" x2="420" y2="144" stroke="#888" stroke-width="1"/>
  <line x1="416" y1="222" x2="420" y2="222" stroke="#888" stroke-width="1"/>
  <line x1="420" y1="144" x2="420" y2="222" stroke="#888" stroke-width="1"/>
  <text x="434" y="188" text-anchor="middle" font-size="8" fill="#555" transform="rotate(-90 434 188)">Medir</text>
  <!-- bottom -->
  <rect x="330" y="252" width="84" height="8" rx="4" fill="#74c0fc" stroke="#4dabf7" stroke-width="1"/>
  <text x="372" y="275" text-anchor="middle" font-size="9.5" fill="#888">Calcular %</text>

  <!-- === STEP LABELS === -->
  <rect x="20" y="290" width="480" height="1" fill="#e0e0e0"/>

  <!-- Classes grid -->
  <text x="260" y="314" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#2d6a4f">Clases texturales por % de capas</text>

  <!-- Class boxes row 1 -->
  <!-- Arenoso -->
  <rect x="22" y="322" width="68" height="34" rx="5" fill="#f4a261" opacity="0.25" stroke="#f4a261" stroke-width="1"/>
  <text x="56" y="334" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7c3517">Arenoso</text>
  <text x="56" y="347" text-anchor="middle" font-size="7.5" fill="#7c3517">Arena &gt; 70%</text>

  <!-- Franco-arenoso -->
  <rect x="96" y="322" width="68" height="34" rx="5" fill="#f9c784" opacity="0.25" stroke="#f9c784" stroke-width="1"/>
  <text x="130" y="333" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7a5a00">Franco</text>
  <text x="130" y="343" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7a5a00">arenoso</text>
  <text x="130" y="352" text-anchor="middle" font-size="7.5" fill="#7a5a00">Arena 50–70%</text>

  <!-- Franco -->
  <rect x="170" y="322" width="68" height="34" rx="5" fill="#74c69d" opacity="0.25" stroke="#52b788" stroke-width="1"/>
  <text x="204" y="334" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1b4332">Franco</text>
  <text x="204" y="347" text-anchor="middle" font-size="7.5" fill="#1b4332">Equilibrio</text>

  <!-- Franco-limoso -->
  <rect x="244" y="322" width="68" height="34" rx="5" fill="#f1c40f" opacity="0.2" stroke="#f1c40f" stroke-width="1"/>
  <text x="278" y="333" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7d6608">Franco</text>
  <text x="278" y="343" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7d6608">limoso</text>
  <text x="278" y="352" text-anchor="middle" font-size="7.5" fill="#7d6608">Limo &gt; 50%</text>

  <!-- Franco-arcilloso -->
  <rect x="318" y="322" width="68" height="34" rx="5" fill="#c9b1ff" opacity="0.25" stroke="#c9b1ff" stroke-width="1"/>
  <text x="352" y="333" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#4b3cad">Franco</text>
  <text x="352" y="343" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#4b3cad">arcilloso</text>
  <text x="352" y="352" text-anchor="middle" font-size="7.5" fill="#4b3cad">Arc. 27–40%</text>

  <!-- Franco-arcilloso-limoso -->
  <rect x="392" y="322" width="54" height="34" rx="5" fill="#ae8fd8" opacity="0.25" stroke="#ae8fd8" stroke-width="1"/>
  <text x="419" y="331" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a1a7d">F-arc.</text>
  <text x="419" y="341" text-anchor="middle" font-size="8" font-weight="bold" fill="#3a1a7d">limoso</text>
  <text x="419" y="351" text-anchor="middle" font-size="7" fill="#3a1a7d">Lim+Arc.&gt;60%</text>

  <!-- Arcilloso -->
  <rect x="452" y="322" width="50" height="34" rx="5" fill="#8e44ad" opacity="0.2" stroke="#8e44ad" stroke-width="1"/>
  <text x="477" y="334" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#4a235a">Arcilloso</text>
  <text x="477" y="347" text-anchor="middle" font-size="7.5" fill="#4a235a">Arc. &gt; 40%</text>

  <!-- Bottom note -->
  <text x="260" y="380" text-anchor="middle" font-size="9.5" fill="#999" font-style="italic">Usar triángulo textural USDA para clasificación exacta</text>
</svg>
