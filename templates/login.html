<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar - Lab agroecológico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card shadow p-4" style="width: 400px;">
        <h3 class="text-center mb-4">Laboratorio agroecológico abierto</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-2">Iniciar Sesión</button>
        </form>

        <hr>
        <p class="text-center small mb-0">¿No tienes cuenta?</p>
        
        <form action="/registro" method="POST" class="mt-2">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" name="new_username" placeholder="Nuevo usuario" required>
                <input type="password" class="form-control" name="new_password" placeholder="Contraseña" required>
                <button type="submit" class="btn btn-success">Registrar</button>
            </div>
        </form>
    </div>

<img src="{{ url_for('static', filename='logo_regosh.png') }}" 
         alt="Logo REGOSH" 
         style="position: fixed; bottom: 15px; right: 15px; width: 100px; height: auto; z-index: 1000; opacity: 0.9;">


</body>
</html>
