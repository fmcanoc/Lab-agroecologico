<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar - Lab Agroecológico</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f6f8; }
        .header-bar { background-color: #212529; color: #ffffff; padding: 1rem 1.5rem; position: fixed; top: 0; width: 100%; z-index: 1050; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .lab-title { color: #fcfbf5; font-weight: 800; letter-spacing: 0.03em; margin: 0; font-size: 1.3rem;}
        .text-highlight { color: #d4ff00; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="height: 100vh; margin: 0;">

    <div class="header-bar shadow-sm">
        <h3 class="lab-title"><span class="text-highlight">🌲</span> LAB AGROECOLÓGICO</h3>
    </div>

    <div class="card shadow p-4" style="width: 400px; margin-top: 60px; border-radius: 12px; border: 1px solid #e9ecef;">
        <h4 class="text-center mb-4 fw-bold" style="color: #1a1a1a;">Laboratorio agroecológico abierto</h4>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} py-2 px-3 text-center small fw-bold" style="border-radius: 8px;">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted mb-1 text-uppercase">Usuario</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted mb-1 text-uppercase">Contraseña</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn text-white w-100 mb-2 fw-bold" style="background-color: #2d6a4f; border-radius: 8px;">Iniciar Sesión</button>
        </form>

        <hr class="my-3 text-muted">
        <p class="text-center small mb-2 text-muted fw-bold">¿No tienes cuenta?</p>
        
        <form action="/registro" method="POST">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" name="new_username" placeholder="Nuevo usuario" required>
                <input type="password" class="form-control" name="new_password" placeholder="Contraseña" required>
                <button type="submit" class="btn btn-dark fw-bold">Registrar</button>
            </div>
        </form>
    </div>

    <img src="{{ url_for('static', filename='logo_regosh.png') }}" 
         alt="Logo REGOSH" 
         style="position: fixed; bottom: 15px; right: 15px; width: 100px; height: auto; z-index: 1000; opacity: 0.9;">

</body>
</html>
